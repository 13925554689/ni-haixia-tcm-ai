<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>倪海厦中医AI · 面诊对话</title>
<style>
:root { --pri: #8B4513; --pri2: #A0522D; --bg: #fdf6ec; --card: #fff; --border: #d4c5a9; --gold: #d4a853; --ai-msg: #f5e6c8; --user-msg: #8B4513; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Microsoft YaHei", sans-serif; background: var(--bg); color: #3e2723; height: 100vh; display: flex; flex-direction: column; }
.header { background: linear-gradient(135deg, #5D2E0C, #8B4513); color: #f5e6c8; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--gold); flex-shrink: 0; }
.header h1 { font-size: 18px; }
.header .sub { font-size: 12px; opacity: .8; }
.main { display: flex; flex: 1; overflow: hidden; }
/* ── 对话面板 ── */
.chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; border-right: 1px solid var(--border); }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; }
.msg { margin-bottom: 14px; animation: fadeIn .3s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg-ai { display: flex; gap: 10px; align-items: flex-start; }
.msg-ai .avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #8B4513, #A0522D); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.msg-ai .bubble { background: var(--ai-msg); border-radius: 4px 16px 16px 16px; padding: 12px 16px; max-width: 75%; font-size: 15px; line-height: 1.7; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.msg-user { display: flex; gap: 10px; align-items: flex-start; justify-content: flex-end; }
.msg-user .bubble { background: var(--user-msg); color: #fff; border-radius: 16px 4px 16px 16px; padding: 12px 16px; max-width: 75%; font-size: 15px; line-height: 1.7; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.msg-question .bubble { border-left: 3px solid var(--gold); }
/* ── 输入区 ── */
.input-bar { display: flex; gap: 8px; padding: 12px 16px; background: #fff; border-top: 1px solid var(--border); align-items: center; flex-shrink: 0; }
.input-bar textarea { flex: 1; padding: 10px 14px; border: 2px solid var(--border); border-radius: 20px; font-size: 15px; line-height: 1.5; font-family: "Microsoft YaHei", sans-serif; background: #fcf8f2; resize: none; outline: none; min-height: 42px; max-height: 100px; }
.input-bar textarea:focus { border-color: var(--pri); }
.btn { padding: 10px 18px; border: none; border-radius: 20px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: "Microsoft YaHei", sans-serif; transition: .2s; white-space: nowrap; }
.btn-send { background: var(--pri); color: #fff; }
.btn-send:hover { background: var(--pri2); }
.btn-voice { background: #fff; color: var(--pri); border: 2px solid var(--pri); width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; padding: 0; flex-shrink: 0; }
.btn-voice.recording { background: #c0392b; color: #fff; border-color: #c0392b; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(192,57,43,.4); } 50% { box-shadow: 0 0 0 12px rgba(192,57,43,0); } }
.btn-reset { background: none; color: #999; border: 1px solid #ccc; font-size: 12px; padding: 6px 12px; }
/* ── 结果面板 ── */
.result-panel { width: 420px; overflow-y: auto; padding: 16px; flex-shrink: 0; background: #faf5eb; }
.result-panel h3 { font-size: 15px; color: var(--pri); border-left: 4px solid var(--gold); padding-left: 10px; margin-bottom: 12px; }
.result-placeholder { color: #999; text-align: center; padding: 40px 0; font-size: 14px; }
.diag-box { background: linear-gradient(135deg, #fdf6ec, #f5e6c8); border: 2px solid var(--gold); border-radius: 10px; padding: 16px; margin: 10px 0; }
.diag-box .label { font-weight: 700; color: var(--pri); font-size: 15px; }
.diag-box .value { font-size: 17px; color: #3e2723; margin-bottom: 6px; }
.channel-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-weight: 700; font-size: 14px; }
.channel-太阳病 { background: #ffe0e0; color: #b71c1c; }
.channel-阳明病 { background: #fff3e0; color: #e65100; }
.channel-少阳病 { background: #fff9c4; color: #f57f17; }
.channel-太阴病 { background: #e8f5e9; color: #1b5e20; }
.channel-少阴病 { background: #e3f2fd; color: #0d47a1; }
.channel-厥阴病 { background: #f3e5f5; color: #4a148c; }
.formula-card { background: #faf5eb; border: 2px solid #d4c5a9; border-radius: 8px; padding: 14px; margin: 10px 0; }
.formula-card .fname { font-size: 19px; font-weight: 700; color: var(--pri); }
.herb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; margin: 8px 0; }
.herb-tag { background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 8px; font-size: 12px; }
.herb-tag .hname { font-weight: 700; color: var(--pri); }
.herb-tag .hprop { font-size: 11px; color: #888; }
.ni-quote { background: #fff; border-left: 3px solid var(--gold); padding: 10px 14px; margin: 8px 0; font-style: italic; color: #5D2E0C; white-space: pre-line; font-size: 13px; }
.warning-box { background: #fff5f5; border-left: 4px solid #c0392b; padding: 10px 14px; border-radius: 0 8px 8px 0; margin: 8px 0; font-size: 13px; }
.evo-tab { margin-top: 20px; }
.evo-stat { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
.evo-item { background: #fdf6ec; border-radius: 6px; padding: 10px; text-align: center; border: 1px solid var(--border); }
.evo-item .enum { font-size: 24px; font-weight: 700; color: var(--pri); }
.evo-item .etxt { font-size: 11px; color: #888; }
@media (max-width: 768px) { .main { flex-direction: column; } .result-panel { width: 100%; max-height: 40vh; } }
</style>
</head>
<body>

<div class="header">
  <div><h1>🏥 倪海厦中医AI · 面诊对话</h1><div class="sub">六经辨证 · 十问法 · 语音输入</div></div>
  <div class="sub" id="statusLine">🤖 LLM增强</div>
</div>

<div class="main">
  <!-- 对话面板 -->
  <div class="chat-panel">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="input-bar">
      <button class="btn-voice" id="btnVoice" onclick="toggleVoice()" title="语音输入">🎤</button>
      <button class="btn-voice" onclick="document.getElementById('tongueInput').click()" title="拍舌苔/上传照片" style="border-color:var(--gold);color:var(--gold)">📷</button>
      <input type="file" id="tongueInput" accept="image/*" capture="environment" style="display:none" onchange="uploadTongue(this)">
      <textarea id="userInput" rows="1" placeholder="描述您的症状，或用语音输入..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
      <button class="btn btn-send" onclick="sendMessage()">发送</button>
      <button class="btn btn-reset" onclick="resetChat()">新面诊</button>
    </div>
  </div>
  <!-- 结果面板 -->
  <div class="result-panel" id="resultPanel">
    <div class="result-placeholder" id="resultPlaceholder">
      <div style="font-size:48px;margin-bottom:12px">🩺</div>
      <div>开始对话后，AI会按倪海厦十问法逐步问诊</div>
      <div style="font-size:12px;margin-top:8px;color:#bbb">覆盖：寒热·汗出·头身·二便·饮食·胸腹·口渴·经带·睡眠·脉象</div>
    </div>
    <div id="resultContent" style="display:none"></div>
  </div>
</div>

<script>
// ━━━ 对话状态 ━━━
const QUESTIONS = [
  "您好，我是倪海厦中医AI助手。请先告诉我：您最不舒服的症状是什么？（越多越详细越好）",
  "请问您怕冷还是怕热？有没有发烧或出汗？",
  "晚上睡得怎么样？是入睡困难还是容易醒？",
  "胃口怎么样？有没有不想吃东西、胃胀、口苦的感觉？",
  "大便情况如何？（成形/稀溏/便秘）小便正常吗？",
  "口渴吗？喜欢喝热水还是冷水？",
  "手脚是温暖的还是冰冷的？",
  "好的，信息差不多了。我来为您辨证开方...",
];
let questionIndex = 0;
let accumulatedSymptoms = [];
let voiceRecognition = null;
let isRecording = false;

// ━━━ 语音识别 ━━━
function toggleVoice() {
  const btn = document.getElementById('btnVoice');
  if (isRecording) { stopVoice(); return; }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert('您的浏览器不支持语音输入。请使用Chrome浏览器。');
    return;
  }

  voiceRecognition = new SpeechRecognition();
  voiceRecognition.lang = 'zh-CN';
  voiceRecognition.interimResults = true;
  voiceRecognition.continuous = false;

  voiceRecognition.onresult = (event) => {
    let transcript = '';
    for (let i = 0; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }
    document.getElementById('userInput').value = transcript;
  };

  voiceRecognition.onend = () => {
    isRecording = false;
    btn.classList.remove('recording');
    btn.textContent = '🎤';
    voiceRecognition = null;
  };

  voiceRecognition.onerror = (e) => {
    isRecording = false;
    btn.classList.remove('recording');
    btn.textContent = '🎤';
    voiceRecognition = null;
    if (e.error !== 'no-speech') console.log('语音错误:', e.error);
  };

  voiceRecognition.start();
  isRecording = true;
  btn.classList.add('recording');
  btn.textContent = '⏹';
}

function stopVoice() {
  if (voiceRecognition) {
    voiceRecognition.stop();
    voiceRecognition = null;
  }
  isRecording = false;
  const btn = document.getElementById('btnVoice');
  btn.classList.remove('recording');
  btn.textContent = '🎤';
}

// ━━━ 消息渲染 ━━━
function escapeHtml(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }

function addMessage(role, text, isQuestion) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  let cls = role === 'ai' ? 'msg-ai' : 'msg-user';
  if (isQuestion) cls += ' msg-question';
  div.className = 'msg ' + cls;
  div.innerHTML = role === 'ai'
    ? `<div class="avatar">🏥</div><div class="bubble">${escapeHtml(text)}</div>`
    : `<div class="bubble">${escapeHtml(text)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addTyping() {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg msg-ai';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="avatar">🏥</div><div class="bubble" style="color:#999">辨证思考中...</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

// ━━━ 发送消息 ━━━
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isRecording) return;
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', text);
  accumulatedSymptoms.push(text);

  // 检查是否应该触发辨证
  if (questionIndex >= QUESTIONS.length - 2 || text.includes('开始辨证') || text.includes('诊断吧')) {
    await runDiagnosis();
  } else {
    // 追问下一个问题
    setTimeout(() => {
      addMessage('ai', QUESTIONS[questionIndex], true);
      questionIndex++;
    }, 600);
  }
}

// ━━━ 触发辨证 ━━━
async function runDiagnosis() {
  addTyping();
  const symptoms = accumulatedSymptoms.join('；');

  try {
    const resp = await fetch('/api/diagnose', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symptoms })
    });
    const data = await resp.json();
    removeTyping();

    if (!resp.ok) {
      addMessage('ai', '辨证暂不可用：' + (data.error || '请稍后重试'));
      return;
    }

    addMessage('ai', QUESTIONS[QUESTIONS.length - 1], true);
    renderResult(data);
  } catch (e) {
    removeTyping();
    addMessage('ai', '请求失败，请确认服务是否运行：' + e.message);
  }
}

// ━━━ 渲染辨证结果 ━━━
function renderResult(d) {
  const el = document.getElementById('resultContent');
  const placeholder = document.getElementById('resultPlaceholder');
  placeholder.style.display = 'none';
  el.style.display = 'block';

  let h = '';
  const ch = d['六经定位'] || '';

  // 六经定位
  h += `<div class="diag-box"><div class="label">📌 六经定位</div>`;
  h += `<span class="channel-badge channel-${ch}">${ch}</span>`;
  if (d['证型']) h += ` <span style="font-weight:700;margin-left:6px">→ ${escapeHtml(d['证型'])}</span>`;
  h += `<div class="value" style="margin-top:6px">${escapeHtml(d['病机']||'')}</div>`;
  h += `<div style="color:#888;font-size:12px">治法：${escapeHtml(d['治法']||'')} | 置信度：${escapeHtml(d['置信度']||'?')}</div>`;
  h += `</div>`;

  // 主方
  if (d['主方']) {
    h += `<div class="formula-card"><div class="fname">💊 ${escapeHtml(d['主方'])}</div>`;
    const fd = d['方剂详情'] || {};
    if (fd['主治']) h += `<div style="font-size:12px;color:#888">${escapeHtml(fd['主治'])}</div>`;
    if (d['药性分析'] && d['药性分析'].length > 0) {
      h += `<div class="herb-grid">`;
      d['药性分析'].forEach(hb => {
        h += `<div class="herb-tag"><div class="hname">${escapeHtml(hb['药名'])} ${escapeHtml(hb['剂量']||'')}</div>`;
        h += `<div class="hprop">${escapeHtml(hb['性味']||'')} · ${escapeHtml(hb['归经']||'')}</div>`;
        if (hb['倪注']) h += `<div style="font-size:11px;color:#8B4513;margin-top:2px">💬 ${escapeHtml(hb['倪注'])}</div>`;
        h += `</div>`;
      });
      h += `</div>`;
    }
    if (d['煎服法']) {
      h += `<div class="diag-box" style="background:#f0f8e8"><div class="label">🍵 煎服法</div><div style="font-size:13px">${escapeHtml(d['煎服法'])}</div></div>`;
    }
    h += `</div>`;
  }

  if (d['倪海厦诊疗思路']) {
    h += `<div class="ni-quote">💭 <b>倪师思路：</b><br>${escapeHtml(d['倪海厦诊疗思路'])}</div>`;
  }

  if (d['llm_enhanced']) {
    h += `<div style="margin:10px 0;padding:12px;background:#fff;border-radius:8px;font-size:13px;white-space:pre-wrap;line-height:1.7">🤖 <b>AI增强分析：</b><br>${escapeHtml(d['llm_enhanced'])}</div>`;
  }

  if (d['注意事项']) {
    h += `<div class="warning-box"><b>⚠ 禁忌与注意事项：</b>${escapeHtml(d['注意事项'])}</div>`;
  }

  // 进化面板
  h += `<div class="evo-tab"><h3>📈 自我进化</h3><div class="evo-stat" id="evoStatsSm"></div></div>`;

  el.innerHTML = h;

  // 加载进化数据
  loadEvolutionMini();
}

async function loadEvolutionMini() {
  try {
    const resp = await fetch('/api/evolution/status');
    const s = await resp.json();
    const st = document.getElementById('evoStatsSm');
    if (st) st.innerHTML = `
      <div class="evo-item"><div class="enum">${s['总案例数']}</div><div class="etxt">案例</div></div>
      <div class="evo-item"><div class="enum">${s['有效率']}</div><div class="etxt">有效率</div></div>
      <div class="evo-item"><div class="enum">${s['知识模式数']}</div><div class="etxt">模式</div></div>
    `;
  } catch(e) {}
}

// ━━━ 舌苔拍照上传 ━━━
async function uploadTongue(input) {
  const file = input.files[0];
  if (!file) return;
  
  addMessage('user', '📷 上传舌苔照片：' + file.name);
  addTyping();
  
  const formData = new FormData();
  formData.append('image', file);
  
  try {
    const resp = await fetch('/api/tongue/upload', { method: 'POST', body: formData });
    const data = await resp.json();
    removeTyping();
    
    if (!resp.ok) {
      addMessage('ai', '舌诊失败：' + (data.error || '请重试'));
      return;
    }
    
    const t = data.tongue_analysis;
    // 在聊天区显示舌诊结果
    let msg = `👅 舌诊分析结果：\n`;
    if (t['舌色']) msg += `• 舌色：${t['舌色']}\n`;
    if (t['舌苔']) msg += `• 舌苔：${t['舌苔']}（${t['舌苔厚度']||'?'}，${t['舌苔润燥']||'?'}）\n`;
    if (t['舌形']) msg += `• 舌形：${t['舌形']}\n`;
    if (t['中医辨证']) msg += `• 辨证：${t['中医辨证']}\n`;
    if (t['倪师解读']) msg += `\n💭 ${t['倪师解读']}\n`;
    if (t['建议关注']) msg += `\n📋 ${t['建议关注']}`;
    if (t['可信度']) msg += `\n\n置信度：${t['可信度']}`;
    
    addMessage('ai', msg);
    
    // 如果有 symptom_hint，自动加入症状积累
    if (data.symptom_hint) {
      accumulatedSymptoms.push(data.symptom_hint);
    }
    
    // 渲染舌诊卡片到右侧面板
    showTongueResult(t);
    
    // 自动追下一步问诊
    if (questionIndex < QUESTIONS.length - 1) {
      setTimeout(() => {
        addMessage('ai', QUESTIONS[questionIndex], true);
        questionIndex++;
      }, 800);
    }
  } catch (e) {
    removeTyping();
    addMessage('ai', '舌诊请求失败：' + e.message);
  }
  
  input.value = ''; // 允许重复上传同一文件
}

function showTongueResult(t) {
  const el = document.getElementById('resultContent');
  const placeholder = document.getElementById('resultPlaceholder');
  placeholder.style.display = 'none';
  el.style.display = 'block';
  
  let h = `<div class="diag-box" style="background:#fff5f0;border-color:#e67e22"><div class="label">👅 舌诊结果</div>`;
  
  const gridStyle = 'display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0;font-size:13px';
  h += `<div style="${gridStyle}">`;
  h += `<div><b>舌色</b><br>${escapeHtml(t['舌色']||'?')}</div>`;
  h += `<div><b>舌形</b><br>${escapeHtml(t['舌形']||'?')}</div>`;
  h += `<div><b>舌苔</b><br>${escapeHtml(t['舌苔']||'?')}</div>`;
  h += `<div><b>润燥</b><br>${escapeHtml(t['舌苔润燥']||'?')}</div>`;
  h += `</div>`;
  
  if (t['中医辨证']) h += `<div style="margin:8px 0;padding:8px;background:#fff;border-radius:6px"><b>📊 辨证：</b>${escapeHtml(t['中医辨证'])}</div>`;
  if (t['倪师解读']) h += `<div class="ni-quote">💭 ${escapeHtml(t['倪师解读'])}</div>`;
  if (t['建议关注']) h += `<div style="font-size:12px;color:#888;margin-top:6px">📋 ${escapeHtml(t['建议关注'])}</div>`;
  h += `<div style="color:#888;font-size:11px;margin-top:6px">可信度：${escapeHtml(t['可信度']||'?')} | 模型：${escapeHtml(t['_vision_model']||'vision')}</div>`;
  h += `</div>`;
  
  el.innerHTML = h;
}

// ━━━ 重置 ━━━
function resetChat() {
  questionIndex = 0;
  accumulatedSymptoms = [];
  document.getElementById('chatMessages').innerHTML = '';
  document.getElementById('resultContent').style.display = 'none';
  document.getElementById('resultPlaceholder').style.display = 'block';
  addMessage('ai', QUESTIONS[0], true);
  questionIndex = 1;
}

// ━━━ 初始化 ━━━
fetch('/api/health').then(r=>r.json()).then(d=>{
  document.getElementById('statusLine').textContent =
    (d.llm_configured ? '🤖 LLM增强' : '📖 规则引擎') + ' | 案例:' + d.cases;
}).catch(()=>{});

// 自适应textarea高度
document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// 开始
addMessage('ai', QUESTIONS[0], true);
questionIndex = 1;
</script>
</body>
</html>
